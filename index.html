<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Celavin</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <!-- Hero -->
    <section class="hero">
      <h1 class="name">Celavin</h1>
      <p class="tagline">寻找生活的质感</p>
    </section>

    <!-- About -->
    <section class="about">
      <h2>关于我</h2>
      <p>
        热爱技术，专注于构建简洁、好用的产品。
        喜欢探索新事物，用代码将想法变成现实。
      </p>
    </section>

    <!-- Projects -->
    <section class="projects">
      <h2>项目</h2>
      <div class="project-list">
        <a class="project-card" href="https://github.com/celavin" target="_blank" rel="noopener">
          <h3>GitHub</h3>
          <p>我的开源项目与代码仓库</p>
        </a>
        <div class="project-card placeholder">
          <h3>即将到来</h3>
          <p>更多项目正在路上...</p>
        </div>
      </div>
    </section>

    <!-- Contact -->
    <section class="contact">
      <h2>联系</h2>
      <div class="links">
        <a href="https://github.com/celavin" target="_blank" rel="noopener">GitHub</a>
      </div>
    </section>
  </main>

  <footer>
    <p>&copy; <span id="year"></span> Celavin</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
